server:
  port: 8001

spring:
  application:
    name: config-server
  profiles:
    default: dev
  cloud:
    config:
      server:
        fail-on-composite-error: false

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,refresh,bus-refresh,prometheus
  endpoint:
    health:
      show-details: always

info:
  app:
    name: SkillSync Config Server
    version: 1.0.0

---
spring:
  config:
    activate:
      on-profile: dev
  cloud:
    config:
      server:
        git:
          uri: ${CONFIG_REPO_URI:https://github.com/saisampath33/skillsync-config-repo}
          default-label: ${CONFIG_REPO_LABEL:main}
          clone-on-start: false
          timeout: 20
          username: ${GIT_USERNAME:}
          password: ${GIT_PAT:}

---
spring:
  config:
    activate:
      on-profile: prod
  cloud:
    config:
      server:
        git:
          uri: ${CONFIG_REPO_URI:https://github.com/saisampath33/skillsync-config-repo}
          default-label: ${CONFIG_REPO_LABEL:main}
          clone-on-start: true
          timeout: 20
          username: ${GIT_USERNAME:}
          password: ${GIT_PAT:}
