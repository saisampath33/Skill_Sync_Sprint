server:
  port: 8011

spring:
  application:
    name: notification-service
  config:
    import: optional:configserver:http://localhost:8001
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

info:
  app:
    name: SkillSync Notification Service
    version: 1.0.0
